#envvars
source = ~/.config/hypr/hyprland-gui.conf
#monitors setup
monitor = DP-2, 1920x1080@165.00Hz, 0x0, 1, vrr, 3, bitdepth, 10

#execs 
exec-once = waybar 
exec-once = hyprpaper
exec-once = nm-applet --indicator &
exec = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = udiskie &

#exec-once = solaar -w hide	#logitech mouse steering software

#general options
general {
	gaps_in = 4
	gaps_out = 8
	layout = dwindle
	border_size = 1
    col.active_border = rgb(ebdbb2) rgb(d65d0e) 60deg
    col.inactive_border = rgb(272727)
	#col.active_border = rgb(ea6962) rgb(a9b665) rgb(ea6962) rgb(a9b665) 60deg
	#col.inactive_border = rgba(e78a4e55) rgba(d8a65755) rgba(e78a4e55) rgba(d8a65755) 45deg
}

decoration {
    dim_special = 0.2
    rounding = 1
    blur {
        enabled = true
        size = 2
        passes = 4
        new_optimizations = true
        vibrancy = 0.1000
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 50
        render_power = 3
        scale = 0.9
    }
}

animations {
    enabled = no
	
	animation = workspaces, 1, 0.1, default
	animation = windows, 1, 0.2, default
}

input {
    kb_layout = pl
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

dwindle {
	pseudotile = true
	preserve_split = true
	smart_split = true
}

xwayland {
  force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    splash_font_family = JetBrains Mono NL NF
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

#definitions
$terminal = alacritty
$launcher = rofi -show drun -run-shell-command '{terminal} -e bash -ic "{cmd} && read"'
$mainMod = SUPER

#binds
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy -t image/png && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of the region taken" -t 1000 # screenshot of a region
bind = SHIFT, Print, exec, grim - | wl-copy -t image/png && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 1000 # screenshot of the whole screen

bind = $mainMod, return, exec, $terminal
bind = $mainMod_SHIFT, q, killactive
bind = $mainMod, d, exec, $launcher
bind = $mainMod, f, fullscreen
bind = $mainMod_SHIFT, E, exit
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, h, togglesplit
bind = $mainMod, L, exec, hyprlock

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u 
bind = Super+Shift, Down, movewindow, d 

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
